<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTRATION FORM</title>
<style>

</style>
</head>
<body>
    <h2>STUDENT REGISTRATION FORM</h2>
    <img src="https://www.pngkey.com/png/detail/203-2035339_register-user-register-online-icon-png.png" alt="description">
<form >
    User Name: <input type="text" id="uname">

    Address : <textarea id="address"></textarea>

    Pincode: <input type="text" id="pincode">

    City:<input type="text" id="city"> 

    State:<input type="text" id="state"> 

    Country: <input type="text" id="country"> 

    Phone Number: <input type="text" id="phone">

    Date of Birth: <input type="date" id="dob">

    Email Id: <input type="text" id="email">

    PAN Number: <input type="text" id="pan">

    Aadhar Number: <input type="text" id="aadhar">
    
    Education: 
    <select id="education">
        <option value="">----Select-----</option>
        <option > SSC</option>
        <option > HSC</option>
        <option > Graduate </option>
        <option > Post Graduate</option>
    </select>

    Gender: 
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <input type="radio" name="gender" value="Other"> Other

    Hobbies:
    <input type="checkbox" name="hobby" value="Reading"> Reading
    <input type="checkbox" name="hobby" value="Gaming"> Gaming    
    <input type="checkbox" name="hobby" value="Dancing"> Dancing
    <input type="checkbox" name="hobby" value="Singing"> Singing
    <input type="checkbox" name="hobby" value="Sports"> Sports
    <input type="checkbox" name="hobby" value="Painting"> Painting    


    Create  Password: <input type="password" id="password">


    Upload Photo:
    <input type="file" id="Photo">

    <input type="submit" id="submit" value="Submit">


</form>
<script>

</script>
</body>
</html>
